name: test-workflow
on: push
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
            - name: Setup 
              run: make setup
            - name: Tests
              run: make test
            - name: Lint
              run: make lint
            - name: Checkout
              id: checkout
              uses: actions/checkout@v4
            - name: Print Hello from Hexlet
              uses: hexlet-components/hello-from-hexlet-action@release
            
